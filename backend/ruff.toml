# ruff config for the FastAPI backend. Kept minimal; tune as the code grows.
target-version = "py311"
line-length = 100

[lint]
# pyflakes (F), pycodestyle errors (E), import sorting (I), bugbear (B),
# pyupgrade (UP) — a sensible, low-noise default for a FastAPI app.
select = ["E", "F", "I", "B", "UP"]

[lint.flake8-bugbear]
# FastAPI's dependency injection is built on calls in argument defaults
# (Depends/Query/Path/...). Treat them as immutable so B008 doesn't flag the
# idiomatic pattern. This is the ruff-recommended setting for FastAPI.
extend-immutable-calls = [
  "fastapi.Depends",
  "fastapi.Query",
  "fastapi.Path",
  "fastapi.Body",
  "fastapi.Header",
  "fastapi.Cookie",
  "fastapi.Form",
  "fastapi.File",
  "fastapi.Security",
]
